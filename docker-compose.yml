services:
  worker:
    build: .
    command: python -u -m app.worker_rmq
    environment:
      PYTHONUNBUFFERED: "1"
      RABBITMQ_URL: ${RABBITMQ_URL}
      RMQ_EXCHANGE: bridge
      RMQ_TASK_QUEUE: bridge.tasks
      RMQ_RETRY_QUEUE: bridge.tasks.retry
      RMQ_RETRY_TTL_MS: 5000

      DATABASE_URL: ${DATABASE_URL}

      AMO_BASE_URL: ${AMO_BASE_URL}
      AMO_CLIENT_ID: ${AMO_CLIENT_ID}
      AMO_CLIENT_SECRET: ${AMO_CLIENT_SECRET}
      AMO_REDIRECT_URI: ${AMO_REDIRECT_URI}
    restart: unless-stopped

  tg_bots:
    build: .
    command: python  -u -m app.tg_bots
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${DATABASE_URL}

      AMO_BASE_URL: ${AMO_BASE_URL}
      AMO_CLIENT_ID: ${AMO_CLIENT_ID}
      AMO_CLIENT_SECRET: ${AMO_CLIENT_SECRET}
      AMO_REDIRECT_URI: ${AMO_REDIRECT_URI}

      TELEGRAM_MASTER_BOT_TOKEN: ${TELEGRAM_MASTER_BOT_TOKEN}
      TELEGRAM_MASTER_BOT_USERNAME: ${TELEGRAM_MASTER_BOT_USERNAME}
      TELEGRAM_OPERATOR_BOT_TOKEN: ${TELEGRAM_OPERATOR_BOT_TOKEN}
      TELEGRAM_OPERATOR_BOT_USERNAME: ${TELEGRAM_OPERATOR_BOT_USERNAME}
    restart: unless-stopped
